services:
  db:
    image: postgres:17
    restart: always
    environment:
      - POSTGRES_USER=terex
      - POSTGRES_PASSWORD=password123
      - POSTGRES_DB=ApiBlog_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    restart: always
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "5050:80"

volumes:
  postgres_data: